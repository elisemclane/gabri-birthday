<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Quest</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background: linear-gradient(to top,#7ec0ee,#cbe9ff);
    font-family:'Press Start 2P', cursive;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main game container */
.world{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;
}

/* Cat area */
#giftBox{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;

    cursor:pointer;
}

/* Fix BIG CAT problem */
#giftBox img{
    width:200px;
    max-width:100%;
    height:auto;
    display:block;
}

/* Text */
.morning-text{
    color:white;
    text-shadow:3px 3px 0 black;
}

.instruction{
    color:white;
    text-shadow:3px 3px 0 black;
    font-size:14px;
}

/* Greeting */
#main-greeting{
    position:absolute;
    top:10%;
    color:white;
    text-shadow:4px 4px 0 black;
    display:none;
}

/* Video */
#videoContainer{
    display:none;
    margin-top:40px;
}

</style>

</head>

<body>

<div class="world">

<h1 id="main-greeting">Hey! It's Your Birthday!</h1>

<div id="giftBox" onclick="openGift()">

<div class="morning-text">Good Morning!</div>

<img src="pixel-cat.png">

<div class="instruction">CLICK THE CAT</div>

</div>

<div id="videoContainer">
<iframe
width="560"
height="315"
src="https://www.youtube.com/embed/dmslZ4ZB13E?autoplay=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

</div>

<script>

function openGift(){
document.getElementById("giftBox").style.display="none";
document.getElementById("main-greeting").style.display="block";
document.getElementById("videoContainer").style.display="block";
}

</script>

</body>
</html>
