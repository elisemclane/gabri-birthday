<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Quest: Gabri</title>
    
    <!-- 8-Bit Font from Google -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
   <style>
/* CSS RESET */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(to top, #7ec0ee 0%, #cbe9ff 100%);
}

/* WORLD CONTAINER */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* MORNING TEXT */
.morning-text {
    color: #fff;
    font-size: 18px;
    text-shadow: 3px 3px 0 #000;
    margin-bottom: 10px;
}

/* (Keep the rest of your CSS unchanged) */
</style>
</head>
<body>

    <div class="world">
        <!-- Text that stays after pop -->
        <h1 id="main-greeting">Hey! Its your Birthday!</h1>

        <!-- Clouds -->
        <div class="cloud" style="top:15%; left:10%;"></div>
        <div class="cloud" style="top:25%; left:60%; animation-delay: -15s;"></div>

        <!-- Video Player -->
        <div id="videoContainer">
            <button class="close-btn" onclick="closeVideo()">[X] CLOSE</button>
            <div class="video-wrapper">
                <!-- Replace 'dQw4w9WgXcQ' with your YouTube ID -->
                <iframe id="videoFrame" 
                    src="https://www.youtube.com/embed/dmslZ4ZB13E?si=OlsK6hfbJTGfD9KN" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- Gift Box -->
      <div id="giftBox" onclick="openGift()" class="cat-wrapper">

    <div class="morning-text">good morning gabri</div>

    <img src="pixel-cat.png" alt="Pixel Cat Holding Present">

    <div class="instruction">CLICK THE CAT</div>
</div>

        <!-- Grass Floor -->
        <div class="grass"></div>
    </div>

    <script>
        function openGift() {
            const gift = document.getElementById('giftBox');
            const greeting = document.getElementById('main-greeting');
            const videoContainer = document.getElementById('videoContainer');
            const videoFrame = document.getElementById('videoFrame');

            // 1. Confetti Burst
            for (let i = 0; i < 12; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.innerText = 'Happy Birthday Gabri!';
                conf.style.setProperty('--x', (Math.random() - 0.5) * 600 + 'px');
                conf.style.setProperty('--y', (Math.random() - 0.5) * 600 + 'px');
                conf.style.setProperty('--r', (Math.random() * 360) + 'deg');
                conf.style.color = ['#FFD700', '#FF5733', '#FFFFFF'][Math.floor(Math.random() * 3)];
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 1200);
            }

            // 2. UI Transitions
            gift.style.display = 'none';
            greeting.style.display = 'block';
            videoContainer.style.display = 'block';
            
            // 3. Start Video
            const currentSrc = videoFrame.src;
            if (!currentSrc.includes('autoplay=1')) {
                videoFrame.src = currentSrc.replace("autoplay=0", "autoplay=1");
            }
        }

        function closeVideo() {
            const videoContainer = document.getElementById('videoContainer');
            const gift = document.getElementById('giftBox');
            const videoFrame = document.getElementById('videoFrame');
            
            videoContainer.style.display = 'none';
            gift.style.display = 'flex';
            
            // Reset video to stop sound
            const currentSrc = videoFrame.src;
            videoFrame.src = currentSrc.replace("autoplay=1", "autoplay=0");
        }
    </script>
</body>
</html>
