<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Quest: Gabri</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(to top, #7ec0ee 0%, #cbe9ff 100%);
}

/* WORLD */
.world {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* MORNING TEXT */
.morning-text {
    margin-bottom: 25px;
    color: #fff;
    font-size: 16px;
    text-shadow: 4px 4px 0 #000;
    animation: floatText 2s ease-in-out infinite;
}

@keyframes floatText {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* GRASS */
.grass {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20%;
    background-color: #00A800;
    border-top: 8px solid #000;
    z-index: 1;
}

/* CLOUDS */
.cloud {
    position: absolute;
    background: white;
    width: 120px; 
    height: 40px;
    box-shadow: 10px 10px 0 #fff, -10px 10px 0 #fff, 0 20px 0 #fff;
    opacity: 0.8;
    animation: drift 50s linear infinite;
}

@keyframes drift {
    from { transform: translateX(-200px); }
    to { transform: translateX(110vw); }
}

/* CAT */
#giftBox {
    cursor: pointer;
    z-index: 15;
    transition: transform 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: bounce 3s ease-in-out infinite;
}

#giftBox:hover {
    transform: scale(1.05);
}

#giftBox img {
    width: 220px;
    image-rendering: pixelated;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.instruction {
    margin-top: 20px;
    color: #fff;
    font-size: 14px;
    text-shadow: 3px 3px 0 #000;
}

/* GREETING AFTER CLICK */
#main-greeting {
    display: none;
    position: absolute;
    top: 10%;
    color: #fff;
    font-size: 28px;
    text-shadow: 4px 4px 0 #000;
    z-index: 100;
    text-align: center;
    width: 100%;
}

/* VIDEO */
#videoContainer {
    display: none;
    position: relative;
    z-index: 50;
    width: 90%;
    max-width: 600px;
    background: #222;
    border: 8px solid #000;
    padding: 10px;
    margin-bottom: 50px;
}

.video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
}

.video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}

.close-btn {
    position: absolute;
    top: -45px; 
    right: 0;
    background: #FF5733; 
    color: #fff;
    border: 4px solid #000;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
}

</style>
</head>

<body>

<div class="world">

<h1 id="main-greeting">Hey! It's your Birthday!</h1>

<div class="cloud" style="top:15%; left:10%;"></div>
<div class="cloud" style="top:25%; left:60%; animation-delay: -15s;"></div>

<div id="videoContainer">
<button class="close-btn" onclick="closeVideo()">[X] CLOSE</button>
<div class="video-wrapper">
<iframe id="videoFrame"
src="https://www.youtube.com/embed/DcWqFJkvE50?autoplay=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>
</div>

<div id="giftBox" onclick="openGift()">
<div class="morning-text">GOOD MORNING GABRI</div>
<img src="pixel-cat.png" alt="Pixel Cat Holding Present">
<div class="instruction">CLICK THE CAT</div>
</div>

<div class="grass"></div>

</div>

<script>

function openGift() {
    const gift = document.getElementById('giftBox');
    const greeting = document.getElementById('main-greeting');
    const videoContainer = document.getElementById('videoContainer');

    gift.style.display = 'none';
    greeting.style.display = 'block';
    videoContainer.style.display = 'block';
}

function closeVideo() {
    const videoContainer = document.getElementById('videoContainer');
    const gift = document.getElementById('giftBox');

    videoContainer.style.display = 'none';
    gift.style.display = 'flex';
}

</script>

</body>
</html>
